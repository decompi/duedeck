<button class="duedeck-dock" data-dock type="button" aria-label="Open DueDeck">
</button>

<aside class="duedeck-panel" data-panel aria-label="DueDeck panel">
    <header class="duedeck-panel__header">
        <div>
            <p class="duedeck-panel__eyebrow">DueDeck</p>
            <h2 class="duedeck-panel__title">Assignments</h2>
        </div>

        <div class="duedeck-panel__actions">
            <button class="duedeck-icon-button" type="button" title="Settings" aria-label="Settings">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 1 1 7.04 4.3l.06.06A1.65 1.65 0 0 0 8.92 4a1.65 1.65 0 0 0 1-1.51V2a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.14.31.39.57.69.73.24.13.52.21.82.21H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z">
                    </path>
                </svg>
            </button>

            <button class="duedeck-icon-button" type="button" title="Sync" aria-label="Sync">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 12a9 9 0 0 1-15.4 6.36L3 15.75"></path>
                    <path d="M3 21v-5.25h5.25"></path>
                    <path d="M3 12A9 9 0 0 1 18.4 5.64L21 8.25"></path>
                    <path d="M15.75 8.25H21V3"></path>
                </svg>
            </button>

            <button class="duedeck-icon-button" data-close type="button" title="Close" aria-label="Close DueDeck">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                </svg>
            </button>
        </div>
    </header>

    <section class="duedeck-panel__body">
        <div class="duedeck-stats" aria-label="Assignment stats">
            <button class="duedeck-stat duedeck-stat--today" type="button">
                <span>Due today</span>
            </button>
            <button class="duedeck-stat duedeck-stat--overdue" type="button">
                <span>Overdue</span>
            </button>
        </div>

        <div class="duedeck-list" aria-label="Assignments"></div>
    </section>

    <footer class="duedeck-panel__footer">
        <button class="duedeck-week-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 2v4"></path>
                <path d="M16 2v4"></path>
                <path d="M3 10h18"></path>
                <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            </svg>
            Open Week View
        </button>
    </footer>
</aside>
